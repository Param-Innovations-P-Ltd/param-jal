<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <radialGradient id="sun" cx="50%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#FBD24F"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </radialGradient>
  </defs>
  <!-- yellow sun -->
  <circle cx="150" cy="150" r="120" fill="url(#sun)"/>
  <!-- offset black square frame -->
  <rect x="110" y="90" width="180" height="180" fill="none" stroke="#0A2540" stroke-width="3"/>
  <!-- script "Param" (approximated) -->
  <text x="150" y="165" text-anchor="middle" font-family="'Great Vibes', 'Brush Script MT', cursive" font-size="92" fill="#0A2540">Param</text>
  <!-- Sanskrit tagline in dark box -->
  <rect x="110" y="198" width="150" height="36" fill="#0A2540"/>
  <text x="185" y="223" text-anchor="middle" font-family="'Noto Serif Devanagari', serif" font-size="22" fill="#F5B800" font-weight="600">जगतं जयतु</text>
</svg>
